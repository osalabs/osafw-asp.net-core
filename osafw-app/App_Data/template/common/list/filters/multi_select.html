<div class="fw-column-filter" data-column-filter-type="<~filter_type>">
  <input type="hidden" name="search[<~field_name>]" value="<~search_value>" data-column-filter-json>
  <select class="form-select form-select-sm mb-1" data-column-filter-blank>
    <option value="">`values`</option>
    <option value="blank" <~/common/attr/selected ifeq="filter_blank_op" value="blank">>`blank`</option>
    <option value="not_blank" <~/common/attr/selected ifeq="filter_blank_op" value="not_blank">>`not blank`</option>
  </select>
  <~select_filter ifeq="filter_type" value="multi_select" inline>
    <select class="form-select form-select-sm" multiple data-column-filter-values>
      <~filter_options select="filter_values_csv" multi=",">
    </select>
  </~select_filter>
  <~autocomplete_filter ifeq="filter_type" value="autocomplete" inline>
    <input type="text" value="<~filter_values_csv>" class="form-control form-control-sm" data-column-filter-values-text data-autocomplete="<~autocomplete_url>">
    <~/common/autocomplete if="autocomplete_url">
  </~autocomplete_filter>
</div>
