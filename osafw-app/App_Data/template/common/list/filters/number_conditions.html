<div class="fw-column-filter" data-column-filter-type="number_conditions">
  <input type="hidden" name="search[<~field_name>]" value="<~search_value>" data-column-filter-json>
  <select class="form-select form-select-sm mb-1" data-column-filter-blank>
    <option value="">`number`</option>
    <option value="blank" <~/common/attr/selected ifeq="filter_blank_op" value="blank">>`blank`</option>
    <option value="not_blank" <~/common/attr/selected ifeq="filter_blank_op" value="not_blank">>`not blank`</option>
  </select>
  <input type="number" step="any" value="<~filter_equal>" class="form-control form-control-sm mb-1" placeholder="=" data-column-filter-equal>
  <input type="number" step="any" value="<~filter_gte>" class="form-control form-control-sm mb-1" placeholder=">=" data-column-filter-gte>
  <input type="number" step="any" value="<~filter_lte>" class="form-control form-control-sm mb-1" placeholder="<=" data-column-filter-lte>
  <input type="number" step="any" value="<~filter_from>" class="form-control form-control-sm mb-1" placeholder="from" data-column-filter-from>
  <input type="number" step="any" value="<~filter_to>" class="form-control form-control-sm mb-1" placeholder="to" data-column-filter-to>
  <input type="number" step="any" value="<~filter_not_between_from>" class="form-control form-control-sm mb-1" placeholder="not from" data-column-filter-not-between-from>
  <input type="number" step="any" value="<~filter_not_between_to>" class="form-control form-control-sm" placeholder="not to" data-column-filter-not-between-to>
</div>
