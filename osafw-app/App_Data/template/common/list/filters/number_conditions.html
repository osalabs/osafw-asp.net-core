<div class="dropdown fw-column-filter fw-column-filter-dropdown" data-column-filter-type="number_conditions">
  <input type="hidden" name="search[<~filter[field]>]" value="<~filter[search_value]>" data-column-filter-json>
  <button type="button" class="btn btn-default btn-sm dropdown-toggle fw-column-filter-summary<~filter[active_class]>" data-bs-toggle="dropdown" data-bs-auto-close="outside" data-bs-boundary="viewport" aria-expanded="false" title="<~filter[label]>">
    <span class="text-truncate"><~filter_value_display if="filter[display]" inline><~filter[display]></~filter_value_display><~filter_empty unless="filter[display]" inline>&nbsp;</~filter_empty></span>
  </button>
  <div class="dropdown-menu p-2 shadow fw-column-filter-menu">
    <select class="form-select form-select-sm mb-2" data-column-filter-blank>
      <option value="">`number`</option>
      <option value="blank" <~/common/attr/selected ifeq="filter[blank_op]" value="blank">>`blank`</option>
      <option value="not_blank" <~/common/attr/selected ifeq="filter[blank_op]" value="not_blank">>`not blank`</option>
    </select>
    <input type="number" step="any" value="<~filter[equal]>" class="form-control form-control-sm mb-2" placeholder="=" data-column-filter-equal>
    <input type="number" step="any" value="<~filter[not_equal]>" class="form-control form-control-sm mb-2" placeholder="!=" data-column-filter-not-equal>
    <input type="number" step="any" value="<~filter[gte]>" class="form-control form-control-sm mb-2" placeholder=">=" data-column-filter-gte>
    <input type="number" step="any" value="<~filter[lte]>" class="form-control form-control-sm mb-2" placeholder="<=" data-column-filter-lte>
    <div class="input-group input-group-sm mb-2">
      <input type="number" step="any" value="<~filter[from]>" class="form-control" placeholder="from" data-column-filter-from>
      <input type="number" step="any" value="<~filter[to]>" class="form-control" placeholder="to" data-column-filter-to>
    </div>
    <div class="input-group input-group-sm mb-2">
      <span class="input-group-text">`not`</span>
      <input type="number" step="any" value="<~filter[not_between_from]>" class="form-control" placeholder="from" data-column-filter-not-between-from>
      <input type="number" step="any" value="<~filter[not_between_to]>" class="form-control" placeholder="to" data-column-filter-not-between-to>
    </div>
    <div class="d-flex gap-2">
      <button type="button" class="btn btn-sm btn-primary flex-fill" data-column-filter-apply>`Apply`</button>
      <button type="button" class="btn btn-sm btn-outline-secondary" data-column-filter-clear>`Clear`</button>
    </div>
  </div>
</div>
