<div class="dropdown fw-column-filter fw-column-filter-dropdown" data-column-filter-type="date_range">
  <input type="hidden" name="search[<~field_name>]" value="<~search_value>" data-column-filter-json>
  <button type="button" class="btn btn-outline-secondary btn-sm dropdown-toggle fw-column-filter-summary<~filter_active_class>" data-bs-toggle="dropdown" data-bs-auto-close="outside" data-bs-boundary="viewport" aria-expanded="false" title="<~field_name_visible>">
    <span class="text-truncate"><~filter_display></span>
  </button>
  <div class="dropdown-menu p-2 shadow fw-column-filter-menu">
    <select class="form-select form-select-sm mb-2" data-column-filter-blank>
      <option value="">`date range`</option>
      <option value="blank" <~/common/attr/selected ifeq="filter_blank_op" value="blank">>`blank`</option>
      <option value="not_blank" <~/common/attr/selected ifeq="filter_blank_op" value="not_blank">>`not blank`</option>
    </select>
    <input type="date" value="<~filter_from>" class="form-control form-control-sm mb-2" data-column-filter-from>
    <input type="date" value="<~filter_to>" class="form-control form-control-sm mb-2" data-column-filter-to>
    <div class="btn-group btn-group-sm w-100 mb-2" role="group">
      <button type="button" class="btn btn-outline-secondary" title="Today" data-column-filter-quick="today">`Today`</button>
      <button type="button" class="btn btn-outline-secondary" title="Last 7 days" data-column-filter-quick="week">`Week`</button>
      <button type="button" class="btn btn-outline-secondary" title="Last 30 days" data-column-filter-quick="30">`30`</button>
    </div>
    <div class="d-flex gap-2">
      <button type="button" class="btn btn-sm btn-primary flex-fill" data-column-filter-apply>`Apply`</button>
      <button type="button" class="btn btn-sm btn-outline-secondary" data-column-filter-clear>`Clear`</button>
    </div>
  </div>
</div>
