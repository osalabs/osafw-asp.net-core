<div class="fw-column-filter fw-column-filter-inline" data-column-filter-type="text">
  <input type="hidden" name="search[<~filter[field]>]" value="<~filter[search_value]>" data-column-filter-json>
  <div class="input-group input-group-sm flex-nowrap">
    <select class="form-select form-select-sm fw-column-filter-op" title="`Operator`" data-column-filter-op>
      <option value="" <~/common/attr/selected ifeq="filter[op]" value="contains">></option>
      <option value="contains">~ contains</option>
      <option value="equals" <~/common/attr/selected ifeq="filter[op]" value="equals">>= equal</option>
      <option value="not_equals" <~/common/attr/selected ifeq="filter[op]" value="not_equals">>!= not equal</option>
      <option value="not_contains" <~/common/attr/selected ifeq="filter[op]" value="not_contains">>!~ not contains</option>
      <option value="starts_with" <~/common/attr/selected ifeq="filter[op]" value="starts_with">>^ begins with</option>
      <option value="not_starts_with" <~/common/attr/selected ifeq="filter[op]" value="not_starts_with">>!^ not begins with</option>
      <option value="ends_with" <~/common/attr/selected ifeq="filter[op]" value="ends_with">>$ ends with</option>
      <option value="not_ends_with" <~/common/attr/selected ifeq="filter[op]" value="not_ends_with">>!$ not ends with</option>
      <option value="blank" <~/common/attr/selected ifeq="filter[blank_op]" value="blank">>B blank</option>
      <option value="not_blank" <~/common/attr/selected ifeq="filter[blank_op]" value="not_blank">>NB not blank</option>
    </select>
    <input type="text" value="<~filter[value]>" class="form-control form-control-sm" data-column-filter-value>
  </div>
  <noscript><input type="text" name="search[<~filter[field]>]" value="<~filter[search_value]>" class="form-control form-control-sm"></noscript>
</div>
