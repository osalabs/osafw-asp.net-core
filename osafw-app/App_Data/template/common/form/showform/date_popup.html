<div class="input-group date">
  <input id="<~field>" name="item[<~field>]" maxlength="10" value="<~value date>" type="text" class="form-control <~class_control>" <~/common/attr/required if="required"> <~attrs_control noescape>>
  <button class="btn btn-outline-secondary" type="button" title="`Choose date`" aria-label="`Choose date`"><~/common/icons/calendar3></button>
</div>
<~./validation_errors if="errors">
<~./help_block if="help_text">
