<div class="form-check form-switch fw-switch-control mb-1">
  <input class="form-check-input <~class_control>" type="checkbox" role="switch" id="<~field>" name="item[<~field>]" value="1" <~/common/attr/checked if="value"> <~/common/attr/required if="required"> <~/common/attr/disabled if="readonly"><~/common/attr/disabled if="disabled"> <~attrs_control noescape>>
  <label class="form-check-label" for="<~field>">`On`</label>
</div>
<~./help_block if="help_text">
