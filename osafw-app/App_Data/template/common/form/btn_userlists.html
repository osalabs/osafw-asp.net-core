<~logged_block if="SESSION[user_id]" inline> 
<div class="btn-group">
  <button type="button" class="btn btn-default dropdown-toggle" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
    <~/common/icons/flag>`Add to List`
  </button>
  <div class="dropdown-menu">
    <a class="dropdown-item on-create-userlist" href="#">`Create New List`</a>
    <div class="dropdown-divider"></div>
    <~my_userlists repeat inline>
      <a class="dropdown-item on-toggle-userlist" href="<~/my/lists/url>/(ToggleList)/<~id>" data-item-id="<~item_id>" data-xss="<~SESSION[XSS]>">
        <span class="flag-yes <~/common/cl/hide unless="is_checked">"><~/common/icons/flag-fill></span>
        <span class="flag-no <~/common/cl/hide if="is_checked">"><~/common/icons/flag></span>
        <~iname>
      </a>
    </~my_userlists>
  </div>
</div>
</~logged_block>
