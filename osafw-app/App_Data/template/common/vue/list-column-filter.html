<script type="text/x-template" id="list-column-filter-template">
    <component v-if="header.filter_component" :is="header.filter_component" :header="header"></component>
    <span v-else-if="filterType==='none'" class="text-muted">-</span>
    <div v-else-if="filterType==='text'" class="fw-column-filter fw-column-filter-inline fw-column-filter-vue" data-column-filter-type="text">
        <div class="input-group input-group-sm flex-nowrap">
            <select class="form-select form-select-sm fw-column-filter-op" title="`Operator`" v-model="op" @change="onTextOpChange">
                <option value=""></option>
                <option value="contains">~ contains</option>
                <option value="equals">= equal</option>
                <option value="not_equals">!= not equal</option>
                <option value="not_contains">!~ not contains</option>
                <option value="starts_with">^ begins with</option>
                <option value="not_starts_with">!^ not begins with</option>
                <option value="ends_with">$ ends with</option>
                <option value="not_ends_with">!$ not ends with</option>
                <option value="blank">B blank</option>
                <option value="not_blank">NB not blank</option>
            </select>
            <input ref="textInput" type="text" class="form-control form-control-sm" data-column-filter-value v-model="value" @change="applyText" @keyup.enter.stop="applyText">
        </div>
    </div>
    <div v-else class="dropdown fw-column-filter fw-column-filter-dropdown fw-column-filter-vue" :data-column-filter-type="filterType">
        <button type="button"
                class="btn btn-default btn-sm dropdown-toggle fw-column-filter-summary"
                :class="{ 'is-active': isActive }"
                data-bs-toggle="dropdown"
                data-bs-auto-close="outside"
                data-bs-boundary="viewport"
                aria-expanded="false"
                :title="header.field_name_visible">
            <span class="text-truncate"><template v-if="displayText">{{ displayText }}</template><template v-else>&nbsp;</template></span>
        </button>
        <div class="dropdown-menu p-2 shadow fw-column-filter-menu">
            <template v-if="filterType==='date_range'">
                <select class="form-select form-select-sm mb-2" v-model="blankOp">
                    <option value="">`date range`</option>
                    <option value="blank">`blank`</option>
                    <option value="not_blank">`not blank`</option>
                </select>
                <input type="date" class="form-control form-control-sm mb-2" v-model="from">
                <input type="date" class="form-control form-control-sm mb-2" v-model="to">
                <div class="btn-group btn-group-sm w-100 mb-2" role="group">
                    <button type="button" class="btn btn-sm btn-outline-secondary" title="Today" @click="quick('today')">`Today`</button>
                    <button type="button" class="btn btn-sm btn-outline-secondary" title="Last 7 days" @click="quick('week')">`Week`</button>
                    <button type="button" class="btn btn-sm btn-outline-secondary" title="Last 30 days" @click="quick('30')">`30`</button>
                </div>
            </template>
            <template v-else-if="filterType==='multi_select'">
                <select class="form-select form-select-sm mb-2" v-model="blankOp">
                    <option value="">`selected values`</option>
                    <option value="blank">`blank`</option>
                    <option value="not_blank">`not blank`</option>
                </select>
                <select class="form-select form-select-sm fw-column-filter-multi" multiple v-model="values" title="`Use Ctrl to select multiple values`">
                    <option v-for="option in options" :key="option.id" :value="String(option.id)">{{ option.iname }}</option>
                </select>
            </template>
            <template v-else-if="filterType==='autocomplete'">
                <select class="form-select form-select-sm mb-2" v-model="blankOp">
                    <option value="">`value`</option>
                    <option value="blank">`blank`</option>
                    <option value="not_blank">`not blank`</option>
                </select>
                <autocomplete v-if="autocompleteUrl"
                              v-model="valuesText"
                              :url="autocompleteUrl"
                              placeholder="`Start typing to select...`"
                              class="form-control-sm"
                              @select="setAutocompleteValue"></autocomplete>
                <input v-else type="text" class="form-control form-control-sm" placeholder="`Start typing to select...`" v-model="valuesText">
            </template>
            <template v-else-if="filterType==='number_conditions'">
                <select class="form-select form-select-sm mb-2" v-model="blankOp">
                    <option value="">`number`</option>
                    <option value="blank">`blank`</option>
                    <option value="not_blank">`not blank`</option>
                </select>
                <input type="number" step="any" class="form-control form-control-sm mb-2" placeholder="=" v-model="equal">
                <input type="number" step="any" class="form-control form-control-sm mb-2" placeholder="!=" v-model="notEqual">
                <input type="number" step="any" class="form-control form-control-sm mb-2" placeholder=">=" v-model="gte">
                <input type="number" step="any" class="form-control form-control-sm mb-2" placeholder="<=" v-model="lte">
                <div class="input-group input-group-sm mb-2">
                    <input type="number" step="any" class="form-control" placeholder="from" v-model="from">
                    <input type="number" step="any" class="form-control" placeholder="to" v-model="to">
                </div>
                <div class="input-group input-group-sm mb-2">
                    <span class="input-group-text">`not`</span>
                    <input type="number" step="any" class="form-control" placeholder="from" v-model="notBetweenFrom">
                    <input type="number" step="any" class="form-control" placeholder="to" v-model="notBetweenTo">
                </div>
            </template>
            <template v-else-if="filterType==='boolean'">
                <select class="form-select form-select-sm" v-model="value">
                    <option value="">`all`</option>
                    <option value="1">`yes`</option>
                    <option value="0">`no`</option>
                    <option value="blank">`blank`</option>
                    <option value="not_blank">`not blank`</option>
                </select>
            </template>
            <span v-else class="text-muted">-</span>
            <div class="d-flex gap-2 mt-2">
                <button type="button" class="btn btn-sm btn-primary flex-fill" data-column-filter-apply @click="apply">`Apply`</button>
                <button type="button" class="btn btn-sm btn-outline-secondary" data-column-filter-clear @click="clear">`Clear`</button>
            </div>
        </div>
    </div>
</script>

<script type="module">
    import { mapStores } from 'pinia';

    fwApp.component('list-column-filter', {
        template: '#list-column-filter-template',
        props: {
            header: {
                type: Object,
                required: true
            }
        },
        data: () => ({
            op: '',
            blankOp: '',
            value: '',
            from: '',
            to: '',
            values: [],
            valuesText: '',
            equal: '',
            notEqual: '',
            gte: '',
            lte: '',
            notBetweenFrom: '',
            notBetweenTo: ''
        }),
        computed: {
            ...mapStores(fwStore),
            filterType() {
                return this.header.filter_type || 'text';
            },
            options() {
                return this.header.filter_options || [];
            },
            autocompleteUrl() {
                return this.header.autocomplete_url || '';
            },
            displayText() {
                const parsed = this.parseSearchValue(this.header.search_value);
                if (!parsed) return '';
                if (parsed.type === 'blank') return 'blank';
                if (parsed.type === 'not_blank') return 'not blank';

                if (parsed.type === 'date_range') {
                    const from = parsed.from || '';
                    const to = parsed.to || '';
                    if (from && to) return from === to ? from : from + ' - ' + to;
                    if (from) return '>= ' + from;
                    if (to) return '<= ' + to;
                }

                if (parsed.type === 'multi_select') {
                    const values = (parsed.values || []).map(v => String(v));
                    if (values.length === 1) return this.optionLabel(values[0]);
                    if (values.length > 1) return values.length + ' selected';
                }

                if (parsed.type === 'autocomplete') {
                    const values = (parsed.values || []).map(v => String(v));
                    if (values.length === 1) return this.autocompleteLabel(values[0]);
                    if (values.length > 1) return values.length + ' selected';
                }

                if (parsed.type === 'number_conditions') return this.numberDisplay(parsed);

                if (parsed.type === 'boolean') {
                    if (['1', 'true', 'yes', 'y'].includes(String(parsed.value).toLowerCase())) return 'Yes';
                    if (['0', 'false', 'no', 'n'].includes(String(parsed.value).toLowerCase())) return 'No';
                }

                return '';
            },
            isActive() {
                return !!this.parseSearchValue(this.header.search_value);
            }
        },
        watch: {
            'header.search_value'() {
                this.loadInitialValue();
            }
        },
        mounted() {
            this.loadInitialValue();
        },
        methods: {
            loadInitialValue() {
                const raw = this.header.search_value || '';
                const parsed = this.parseSearchValue(raw);
                this.resetDraft();

                if (!parsed) {
                    if (this.filterType === 'text') this.value = raw || '';
                    return;
                }

                if (parsed.type === 'blank' || parsed.type === 'not_blank') {
                    if (this.filterType === 'text') this.op = parsed.type;
                    else if (this.filterType === 'boolean') this.value = parsed.type;
                    else this.blankOp = parsed.type;
                }

                this.op = parsed.op === 'contains' ? '' : (parsed.op || this.op);
                this.value = parsed.value || this.value || '';
                this.from = parsed.from || '';
                this.to = parsed.to || '';
                this.values = (parsed.values || []).map(v => String(v));
                this.valuesText = this.values.join(',');
                this.equal = this.hasFilterValue(parsed.equal)
                    ? parsed.equal
                    : (this.filterType === 'number_conditions' && this.hasFilterValue(parsed.value) ? parsed.value : '');
                this.notEqual = this.hasFilterValue(parsed.not_equal) ? parsed.not_equal : (this.hasFilterValue(parsed.not_equals) ? parsed.not_equals : '');
                this.gte = this.hasFilterValue(parsed.gte) ? parsed.gte : '';
                this.lte = this.hasFilterValue(parsed.lte) ? parsed.lte : '';
                this.notBetweenFrom = this.hasFilterValue(parsed.not_between_from) ? parsed.not_between_from : '';
                this.notBetweenTo = this.hasFilterValue(parsed.not_between_to) ? parsed.not_between_to : '';
            },
            resetDraft() {
                this.op = '';
                this.blankOp = '';
                this.value = '';
                this.from = '';
                this.to = '';
                this.values = [];
                this.valuesText = '';
                this.equal = '';
                this.notEqual = '';
                this.gte = '';
                this.lte = '';
                this.notBetweenFrom = '';
                this.notBetweenTo = '';
            },
            parseSearchValue(raw) {
                if (!raw) return null;
                if (raw && typeof raw === 'object') return raw;
                if (typeof raw !== 'string') return null;

                const trimmed = raw.trim();
                if (!trimmed) return null;
                if (trimmed.startsWith('{')) {
                    try { return JSON.parse(trimmed); } catch { return null; }
                }

                return this.filterType === 'text' ? { type: 'text', op: 'contains', value: raw } : null;
            },
            applyText() {
                this.apply();
            },
            onTextOpChange() {
                if (this.op === 'blank' || this.op === 'not_blank') {
                    this.applyText();
                    return;
                }
                this.$nextTick(() => {
                    if (this.$refs.textInput) this.$refs.textInput.focus();
                });
            },
            apply() {
                const payload = this.payload();
                this.header.search_value = payload ? JSON.stringify(payload) : '';
                this.hideDropdown();
                this.fwStore.setFilters({});
            },
            clear() {
                this.resetDraft();
                this.header.search_value = '';
                this.hideDropdown();
                this.fwStore.setFilters({});
            },
            hideDropdown() {
                const toggle = this.$el.querySelector && this.$el.querySelector('[data-bs-toggle="dropdown"]');
                if (!toggle || !window.bootstrap || !window.bootstrap.Dropdown) return;
                window.bootstrap.Dropdown.getOrCreateInstance(toggle).hide();
            },
            payload() {
                if (this.filterType !== 'text' && this.filterType !== 'boolean' && this.blankOp) return { type: this.blankOp };

                if (this.filterType === 'text') {
                    if (this.op === 'blank' || this.op === 'not_blank') return { type: this.op };
                    return this.value ? { type: 'text', op: this.op || 'contains', value: this.value } : null;
                }

                if (this.filterType === 'date_range') {
                    return (this.from || this.to) ? { type: 'date_range', from: this.from, to: this.to } : null;
                }

                if (this.filterType === 'multi_select') {
                    return this.values.length ? { type: 'multi_select', values: this.values } : null;
                }

                if (this.filterType === 'autocomplete') {
                    const values = this.valuesText.split(',').map(v => v.trim()).filter(v => v.length);
                    return values.length ? { type: 'autocomplete', values: values } : null;
                }

                if (this.filterType === 'number_conditions') {
                    let payload = { type: 'number_conditions' };
                    if (this.hasFilterValue(this.equal)) payload.equal = this.equal;
                    if (this.hasFilterValue(this.notEqual)) payload.not_equal = this.notEqual;
                    if (this.hasFilterValue(this.gte)) payload.gte = this.gte;
                    if (this.hasFilterValue(this.lte)) payload.lte = this.lte;
                    if (this.hasFilterValue(this.from)) payload.from = this.from;
                    if (this.hasFilterValue(this.to)) payload.to = this.to;
                    if (this.hasFilterValue(this.notBetweenFrom)) payload.not_between_from = this.notBetweenFrom;
                    if (this.hasFilterValue(this.notBetweenTo)) payload.not_between_to = this.notBetweenTo;
                    return Object.keys(payload).length > 1 ? payload : null;
                }

                if (this.filterType === 'boolean') {
                    if (this.value === 'blank' || this.value === 'not_blank') return { type: this.value };
                    return this.value !== '' ? { type: 'boolean', value: this.value } : null;
                }

                return null;
            },
            setAutocompleteValue(value) {
                this.valuesText = value || this.valuesText;
            },
            quick(mode) {
                const to = new Date();
                const from = new Date(to.getTime());
                if (mode === 'week') from.setDate(to.getDate() - 6);
                if (mode === '30') from.setDate(to.getDate() - 29);
                this.blankOp = '';
                this.from = this.formatDate(from);
                this.to = this.formatDate(to);
            },
            formatDate(d) {
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return d.getFullYear() + '-' + month + '-' + day;
            },
            optionLabel(value) {
                const option = this.options.find(option => String(option.id) === String(value));
                return option ? option.iname : value;
            },
            autocompleteLabel(value) {
                const separator = ' ::: ';
                const index = value.indexOf(separator);
                return index < 0 ? value : value.substring(0, index).trim();
            },
            hasFilterValue(value) {
                return value !== undefined && value !== null && String(value).length > 0;
            },
            numberDisplay(parsed) {
                if (this.hasFilterValue(parsed.equal)) return '= ' + parsed.equal;
                let parts = [];
                const notEqual = this.hasFilterValue(parsed.not_equal) ? parsed.not_equal : parsed.not_equals;
                if (this.hasFilterValue(notEqual)) parts.push('!= ' + notEqual);
                if (this.hasFilterValue(parsed.gte)) parts.push('>= ' + parsed.gte);
                if (this.hasFilterValue(parsed.lte)) parts.push('<= ' + parsed.lte);
                if (this.hasFilterValue(parsed.from) || this.hasFilterValue(parsed.to)) {
                    const from = this.hasFilterValue(parsed.from) ? parsed.from : '';
                    const to = this.hasFilterValue(parsed.to) ? parsed.to : '';
                    parts.push(from + ' - ' + to);
                }
                if (this.hasFilterValue(parsed.not_between_from) || this.hasFilterValue(parsed.not_between_to)) {
                    const from = this.hasFilterValue(parsed.not_between_from) ? parsed.not_between_from : '';
                    const to = this.hasFilterValue(parsed.not_between_to) ? parsed.not_between_to : '';
                    parts.push('not ' + from + ' - ' + to);
                }
                return parts.length ? parts.join(', ') : '';
            }
        }
    });
</script>
