<!--
  component usage: include common/modal to enable remote Bootstrap modals and lookup add/edit helpers.

  1) Add /common/modal include to a load_script.html
  2) Trigger with:
     <button class="on-fw-modal" data-url="/admin/controller/(action)">Open Modal</button>
     - Optional: data-modal-dialog-class / data-modal-content-class to tweak Bootstrap classes.
     - Optional: data-modal-class to add classes to the generated root .modal element.
     - Optional: Bootstrap data-bs-* modal options are copied from trigger to modal.
       Example: data-bs-backdrop="static" data-bs-keyboard="false"
     - Optional: data-fw-modal-namespace-ids="1" to namespace loaded content IDs.
  3) Lookup modal helpers:
     - data-fw-lookup="add" or "edit" to enable lookup mode.
     - data-fw-lookup-target="#selector" to specify which control to update (defaults to first input/select in input-group).
     - URLs can include {id} placeholder for edit actions (current select value).
     - On save, controller returns JSON with lookup_label; select option is added/updated.
     - On save, target receives change and fw-lookup-saved events.
     - Lookup modals namespace loaded IDs by default; use data-fw-modal-namespace-ids="0" to opt out.
  4) Modal component appends `_layout=modal` to loaded URLs and form submits.
  5) Forms inside modal are submitted via ajax/fetch and HTML response replaces modal content.
  6) Links inside loaded modal content with class `on-fw-modal-link` are fetched into the same modal.
  7) In modal JS, get the trigger element:
     var trigger = fw.modalTriggerEl(fw.scopeFromScript());
-->
<script src="<~GLOBAL[ASSETS_URL]>/js/fw-modal.js?v<~GLOBAL[SITE_VERSION]>"></script>
