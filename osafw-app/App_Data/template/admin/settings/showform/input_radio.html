<div class="row form-row">
  <label class="col-form-label col-md-3" for="ivalue">`Setting content`</label>
  <div class="col">
    <~settings_options repeat inline>
    <div class="form-check">
      <input type="radio" class="form-check-input" id="ivalue$<~repeat.index>" name="item[ivalue]" value="<~id>" <~/common/attr/checked if="is_selected">>
      <label class="form-check-label" for="ivalue$<~repeat.index>"><~iname></label>
    </div>
    </~settings_options>
  </div>
</div>
