<div class="row form-row">
  <label class="col-form-label col-md-3" for="ivalue">`Current value`</label>
  <div class="col">
    <p class="form-control-plaintext"><~i[credential_display]></p>
  </div>
</div>
<div class="row form-row">
  <label class="col-form-label col-md-3" for="ivalue">`New value`</label>
  <div class="col">
    <textarea id="ivalue" name="item[ivalue]" rows="5" class="form-control" autocomplete="off"></textarea>
    <small class="form-text">`Leave blank to keep the current value.`</small>
  </div>
</div>
