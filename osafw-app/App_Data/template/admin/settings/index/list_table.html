<div class="fw-list-card">
<table class="table table-sm table-hover list">
    <thead>
        <tr data-sortby="<~f[sortby]>" data-sortdir="<~f[sortdir]>">
            <th data-sort="iname">`Name`</th>
            <th>`Content`</th>
            <!--th data-sort="upd_time">`Updated on`</th-->
            <th></th>
        </tr>
    </thead>
    <tbody class="table-group-divider">
<~list_rows repeat inline>
        <tr data-url="<~row_click_url>">
            <td><~iname></td>
            <td>
                <~switch_value ifeq="input" value="70" inline>
                <div class="form-check form-switch m-0">
                    <input class="form-check-input" type="checkbox" role="switch" disabled <~/common/attr/checked ifeq="ivalue" value="1">>
                </div>
                </~switch_value>
                <~regular_value ifne="input" value="70" inline><~ivalue_display truncate></~regular_value>
            </td>
            <!--td><~upd_time></td-->
            <td class="text-nowrap d-print-none text-end">
                <a href="<~row_click_url>">`Edit`</a>
            </td>
        </tr>
</~list_rows>
    </tbody>
</table>

<~/common/list/pagination>
</div>
